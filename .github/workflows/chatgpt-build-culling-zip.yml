name: Build Source SDK culling ZIP

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source SDK 2012
        uses: actions/checkout@v4
        with:
          repository: nn-firc/source-sdk-2012
          ref: master
          path: sdk

      - name: Collect selected files
        shell: bash
        run: |
          set -euo pipefail
          files=(
            "engine/gl_rmain.cpp"
            "engine/gl_rsurf.cpp"
            "engine/gl_model_private.h"
            "engine/cdll_engine_int.cpp"
            "public/cdll_int.h"
            "public/bspfile.h"
            "mathlib/mathlib_base.cpp"
            "public/mathlib/ssemath.h"
            "game/client/viewrender.cpp"
            "game/client/viewrender.h"
            "game/client/clientleafsystem.cpp"
            "utils/vvis/vvis.cpp"
            "utils/vvis/flow.cpp"
            "utils/vvis/vis.h"
            "engine/staticpropmgr.cpp"
            "engine/l_studio.cpp"
            "game/client/modelrendersystem.cpp"
            "game/client/c_baseentity.cpp"
            "game/client/c_baseentity.h"
            "game/client/c_baseanimating.cpp"
            "game/client/c_baseanimating.h"
            "materialsystem/occlusionquerymgr.cpp"
            "materialsystem/cmatrendercontext.cpp"
            "materialsystem/cmatrendercontext.h"
            "materialsystem/cmatqueuedrendercontext.cpp"
            "materialsystem/cmatqueuedrendercontext.h"
            "game/client/c_pixel_visibility.cpp"
            "game/client/viewpostprocess.cpp"
            "engine/gl_lightmap.cpp"
            "engine/gl_lightmap.h"
            "engine/lightcache.cpp"
            "engine/lightcache.h"
            "engine/shadowmgr.cpp"
            "game/client/clientshadowmgr.cpp"
            "game/client/c_env_cascade_light.cpp"
            "particles/particles.cpp"
            "public/particles/particles.h"
            "game/client/particlemgr.h"
            "game/client/c_func_reflective_glass.cpp"
            "engine/matsys_interface.cpp"
            "materialsystem/shaderapidx9/shaderapidx10.cpp"
            "materialsystem/shaderapidx9/dxabstract.cpp"
            "materialsystem/shaderapidx9/dxabstract.h"
            "materialsystem/glmgr/glmgrbasics.cpp"
            "togl/dxabstract.cpp"
            "togl/glmgrbasics.cpp"
            "togles/dxabstract.cpp"
            "togles/glmgrbasics.cpp"
            "public/materialsystem/imaterialsystem.h"
          )

          rm -rf package
          mkdir package
          for file in "${files[@]}"; do
            test -f "sdk/$file"
            mkdir -p "package/$(dirname "$file")"
            cp -- "sdk/$file" "package/$file"
          done

          test "$(find package -type f | wc -l)" -eq "${#files[@]}"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-sdk-2012-culling-files
          path: package/
          if-no-files-found: error
          compression-level: 9
          retention-days: 1
